display_information:
  name: staynalive-transkrybe
  description: "Music and audio intelligence — MACF AI agent"
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: "🎵 Transkrybe Agent"
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.customize
      - reactions:write
      - users:read
settings:
  event_subscriptions:
    request_url: https://jesse-slack-agents.vercel.app/api/slack/events
    bot_events:
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
    request_url: https://jesse-slack-agents.vercel.app/api/slack/actions
  org_deploy_enabled: false
  socket_mode_enabled: false
